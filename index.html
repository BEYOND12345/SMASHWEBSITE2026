    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is SMASH Invoices?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "SMASH lets you send a priced estimate, quote or invoice in under 60 seconds — talk on iPhone or scan the Gmail thread at your desk. Live in Australia, New Zealand, the UK, the US and Canada. Free to start."
          }
        },
        {
          "@type": "Question",
          "name": "Is SMASH free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. SMASH has a free plan with 5 quotes or invoices per month — no credit card needed. Paid plans unlock unlimited volume, Xero and QuickBooks, and CSV export."
          }
        },
        {
          "@type": "Question",
          "name": "How fast can I send an estimate or quote?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Under 60 seconds. Describe the job or open the customer email, verify line items against your catalog, send. Your client gets a professional PDF with approval and payment options. Same document — estimate in the US/CA, quote in AU/UK."
          }
        },
        {
          "@type": "Question",
          "name": "Can I send a hands-free invoice after a job?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes on iPhone. Hold Start Recording, describe labour and materials out loud, verify priced lines from your catalog, and send — no typing on site. Many users send the invoice before they start the van. That is voice to invoice — the same engine as AI estimates."
          }
        },
        {
          "@type": "Question",
          "name": "Does SMASH work for GST and VAT invoices?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Every document is tax-ready with your business number, tax breakdown, and sequential numbers. GST, VAT, and sales tax are calculated per line item for your region."
          }
        }
      ]
    }
