  to = "/integrations/gmail-xero-quote-builder/index.html"
  status = 200

[[redirects]]
  from = "/gmail-invoice"
  to = "/gmail-invoice/index.html"
  status = 200

# /voice-invoicing — SPA for humans; edge function rewrites crawlers to static HTML
[[redirects]]
  from = "/voice-invoicing"
  to = "/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/voice-invoicing/"
  to = "/index.html"
  status = 200
  force = true

[[edge_functions]]
  function = "voice-invoicing-route"
  path = "/voice-invoicing"

[[edge_functions]]
  function = "voice-invoicing-route"
  path = "/voice-invoicing/*"

[[redirects]]
  from = "/invoice-on-mobile"
  to = "/voice-invoicing"
  status = 301
  force = true

[[redirects]]
  from = "/invoice-on-mobile/"
  to = "/voice-invoicing"
  status = 301
  force = true

[[redirects]]
