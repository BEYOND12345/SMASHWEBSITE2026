<html><head><meta charset="utf-8"><style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:system-ui,-apple-system,sans-serif; background:#F4F6F9; }
.sidebar { padding:24px; background:#F4F6F9; height:100vh; overflow:auto; }
.header { color:#5f6368; font-size:12px; letter-spacing:1px; margin-bottom:8px; }
.title { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:28px; color:#0F172A; letter-spacing:-1px; margin-bottom:20px; }
.parsing-label { color:#5f6368; font-size:12px; font-weight:600; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
.spinner { width:12px; height:12px; border:2px solid #dfff00; border-top-color:transparent; border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.line-item { background:#fff; padding:16px; border-radius:8px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; border-left:4px solid #dfff00; }
.item-left { }
.item-name { font-weight:600; color:#0F172A; font-size:14px; }
.item-matched { display:flex; align-items:center; gap:6px; color:#3dd68c; font-size:12px; font-weight:600; margin-top:4px; }
.item-price { font-weight:900; color:#dfff00; font-size:16px; }
.progress { background:#e0e0e0; height:4px; border-radius:2px; margin-top:20px; overflow:hidden; }
.progress-bar { background:#dfff00; height:100%; width:65%; border-radius:2px; }
</style></head><body>
<div class="sidebar">
  <div class="header">PARSING EMAIL...</div>
  <div class="title">PLUMBING SUPPLIES</div>
  
  <div class="parsing-label"><div class="spinner"></div> MATCHING TO YOUR CATALOGUE</div>
  
  <div class="line-item">
    <div class="item-left">
      <div class="item-name">15mm copper pipe (10m)</div>
      <div class="item-matched">✓ Matched SKU-CP-15-10M</div>
    </div>
    <div class="item-price">$145</div>
  </div>
  
  <div class="line-item">
    <div class="item-left">
      <div class="item-name">22mm copper pipe (5m)</div>
      <div class="item-matched">✓ Matched SKU-CP-22-5M</div>
    </div>
    <div class="item-price">$98</div>
  </div>
  
  <div class="line-item">
    <div class="item-left">
      <div class="item-name">15mm fittings (10-pack)</div>
      <div class="item-matched">✓ Matched SKU-FIT-15-10</div>
    </div>
    <div class="item-price">$42</div>
  </div>
  
  <div class="line-item" style="opacity:0.6;">
    <div class="item-left">
      <div class="item-name">22mm fittings (10-pack)</div>
      <div style="font-size:12px; color:#b0b0b0; margin-top:4px;">Matching...</div>
    </div>
    <div style="color:#b0b0b0;">--</div>
  </div>
  
  <div class="progress">
    <div class="progress-bar"></div>
  </div>
</div>
</body></html>
