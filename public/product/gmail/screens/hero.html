<html><head><meta charset="utf-8"><style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:system-ui,-apple-system,sans-serif; background:#0F172A; }
.container { display:flex; height:100vh; }
.gmail { flex:1; background:#fff; display:flex; flex-direction:column; padding:20px; border-right:1px solid #e0e0e0; }
.gmail-header { display:flex; align-items:center; gap:12px; margin-bottom:20px; padding-bottom:16px; border-bottom:1px solid #f0f0f0; }
.gmail-logo { font-weight:900; font-size:24px; color:#1a73e8; }
.gmail-search { flex:1; background:#f1f3f4; border-radius:24px; padding:12px 16px; font-size:14px; border:none; }
.inbox { flex:1; overflow:hidden; }
.email-row { background:#f8f9fa; padding:16px; border-radius:8px; cursor:pointer; border-left:4px solid #dfff00; }
.email-from { font-weight:600; color:#0F172A; font-size:14px; }
.email-subject { color:#0F172A; font-size:14px; margin-top:4px; }
.email-preview { color:#5f6368; font-size:12px; margin-top:4px; }

.sidebar { flex:1; background:#F4F6F9; padding:24px; display:flex; flex-direction:column; gap:20px; }
.sidebar-header { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:24px; color:#0F172A; letter-spacing:2px; }
.quote-line { background:#fff; padding:16px; border-radius:8px; display:flex; justify-content:space-between; align-items:center; border-left:4px solid #dfff00; }
.line-item { font-size:14px; color:#0F172A; font-weight:600; }
.line-price { font-weight:900; color:#dfff00; font-size:16px; }
.quote-total { background:#0F172A; color:#fff; padding:20px; border-radius:8px; display:flex; justify-content:space-between; align-items:center; margin-top:16px; }
.total-label { font-size:14px; letter-spacing:1px; }
.total-amount { font-weight:900; font-size:32px; color:#dfff00; }
.cta { background:#dfff00; color:#0F172A; padding:16px; border-radius:8px; text-align:center; font-weight:900; margin-top:16px; cursor:pointer; }
</style></head><body>
<div class="container">
  <div class="gmail">
    <div class="gmail-header">
      <div class="gmail-logo">Gmail</div>
      <input class="gmail-search" placeholder="Search" />
    </div>
    <div class="inbox">
      <div class="email-row">
        <div class="email-from">Sarah Jones</div>
        <div class="email-subject">Quote request - Kitchen tap replacement</div>
        <div class="email-preview">Hi, I need a quote for replacing the kitchen tap, removing old,...</div>
      </div>
    </div>
  </div>
  
  <div class="sidebar">
    <div style="color:#5f6368; font-size:12px; letter-spacing:1px;">SMASH QUOTE BUILDER</div>
    <div class="sidebar-header">KITCHEN TAP<br/>REPLACEMENT</div>
    
    <div class="quote-line">
      <div class="line-item">Call-out fee</div>
      <div class="line-price">$500</div>
    </div>
    <div class="quote-line">
      <div class="line-item">Travel - Zone 2</div>
      <div class="line-price">$80</div>
    </div>
    <div class="quote-line">
      <div class="line-item">Labour - 2 hrs</div>
      <div class="line-price">$170</div>
    </div>
    <div class="quote-line">
      <div class="line-item">Compression fittings</div>
      <div class="line-price">$48</div>
    </div>
    <div class="quote-line">
      <div class="line-item">GST</div>
      <div class="line-price">$80</div>
    </div>
    
    <div class="quote-total">
      <div class="total-label">TOTAL</div>
      <div class="total-amount">$878</div>
    </div>
    
    <div class="cta">SEND QUOTE →</div>
  </div>
</div>
</body></html>
