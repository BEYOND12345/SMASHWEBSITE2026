<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=900"><style>
@font-face { font-family:'BarlowBlkIt'; src:url('/fonts/BarlowCondensed-BlackItalic.ttf') format('truetype'); font-weight:900; font-style:italic; font-display:swap; }
@font-face { font-family:'BarlowBlk'; src:url('/fonts/BarlowCondensed-Black.ttf') format('truetype'); font-weight:900; font-style:normal; font-display:swap; }
@font-face { font-family:'Jakarta'; src:url('/fonts/PlusJakartaSans.ttf') format('truetype'); font-weight:400 700; font-style:normal; font-display:swap; }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: transparent; overflow: hidden; }
  .phone { width: 900px; height: 1240px; background: #FFFFFF; border-radius: 72px; overflow: hidden; position: relative; transform-origin: top left; box-shadow: none; }
  .phone::after { content: ''; position: absolute; left: 0; right: 0; bottom: 0; height: 560px; background: linear-gradient(to bottom, rgba(15,23,42,0) 0%, rgba(15,23,42,0.6) 40%, #0F172A 80%); z-index: 20; pointer-events: none; }




* { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }



.eyebrow { font-family:'BarlowBlkIt'; font-style:italic; font-weight:900; font-size:50px; letter-spacing:6px; color:#DFFF00; text-transform:uppercase; margin-bottom:24px; line-height:1; }
.headline { font-family:'BarlowBlkIt'; font-style:italic; font-weight:900; font-size:170px; line-height:0.82; letter-spacing:-3px; text-transform:uppercase; color:#FFFFFF; }
.headline .lime { color:#DFFF00; }


.phone { width:900px; height:1240px; background:#FFFFFF; border-radius:72px; box-shadow:0 60px 150px rgba(0,0,0,0.55); overflow:hidden; position:relative; }
/* fade phone bottom into navy */
.phone::after { content:''; position:absolute; left:0; right:0; bottom:0; height:560px; background:linear-gradient(to bottom, rgba(15,23,42,0) 0%, rgba(15,23,42,0.6) 40%, #0F172A 80%); z-index:20; }
.statusbar { height:90px; display:flex; align-items:center; justify-content:space-between; padding:0 62px 0 70px; background:#F4F6F9; }
.statusbar .time { font-family:'Jakarta'; font-weight:700; font-size:34px; color:#0F172A; }
.statusbar .icons { display:flex; align-items:center; gap:14px; }
.batt { width:54px; height:28px; border:3px solid #0F172A; border-radius:7px; position:relative; }
.batt::after { content:''; position:absolute; right:-7px; top:8px; width:5px; height:12px; background:#0F172A; border-radius:0 2px 2px 0; }
.batt .fill { position:absolute; left:3px; top:3px; bottom:3px; width:72%; background:#0F172A; border-radius:3px; }
.appbar { padding:34px 56px 26px; background:#F4F6F9; display:flex; align-items:center; gap:28px; }
.appbar .cancel { font-family:'Jakarta'; font-weight:700; font-size:30px; color:#94A3B8; }
.appbar .title { font-family:'BarlowBlk'; font-weight:900; font-size:42px; letter-spacing:2px; color:#0F172A; text-transform:uppercase; }
.screen { background:#F4F6F9; padding:8px 56px 30px; }
.row { background:#FFFFFF; border-radius:34px; padding:36px 46px; margin-bottom:24px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 2px 10px rgba(15,23,42,0.05); transform-origin:center center; will-change:transform; }
.row .left { display:flex; align-items:center; gap:28px; min-width:0; }
.row .dot { width:26px; height:26px; border-radius:50%; background:#DFFF00; flex-shrink:0; box-shadow:0 0 0 6px rgba(223,255,0,0.18); }
.row .label { font-family:'BarlowBlk'; font-weight:900; font-size:34px; letter-spacing:2px; color:#1E293B; text-transform:uppercase; white-space:nowrap; }
.row .val { font-family:'Jakarta'; font-weight:700; font-size:30px; color:#0F172A; text-align:right; white-space:nowrap; padding-left:24px; }

/* Sequential intake pulse — one row at a time, top → bottom, loop */
@keyframes voice-row-intake {
  0%, 2% { transform: scale(1); box-shadow: 0 2px 10px rgba(15,23,42,0.05); }
  6% { transform: scale(1.022); box-shadow: 0 8px 22px rgba(15,23,42,0.10); }
  11% { transform: scale(1); box-shadow: 0 2px 10px rgba(15,23,42,0.05); }
  100% { transform: scale(1); box-shadow: 0 2px 10px rgba(15,23,42,0.05); }
}
@keyframes voice-dot-intake {
  0%, 2% { transform: scale(1); box-shadow: 0 0 0 6px rgba(223,255,0,0.18); }
  6% { transform: scale(1.18); box-shadow: 0 0 0 10px rgba(223,255,0,0.28); }
  11% { transform: scale(1); box-shadow: 0 0 0 6px rgba(223,255,0,0.18); }
  100% { transform: scale(1); box-shadow: 0 0 0 6px rgba(223,255,0,0.18); }
}
.screen .row {
  animation: voice-row-intake 7.2s cubic-bezier(0.33, 0.1, 0.25, 1) infinite;
}
.screen .row .dot {
  animation: voice-dot-intake 7.2s cubic-bezier(0.33, 0.1, 0.25, 1) infinite;
}
.screen .row:nth-child(1) { animation-delay: 0s; }
.screen .row:nth-child(1) .dot { animation-delay: 0s; }
.screen .row:nth-child(2) { animation-delay: 1.2s; }
.screen .row:nth-child(2) .dot { animation-delay: 1.2s; }
.screen .row:nth-child(3) { animation-delay: 2.4s; }
.screen .row:nth-child(3) .dot { animation-delay: 2.4s; }
.screen .row:nth-child(4) { animation-delay: 3.6s; }
.screen .row:nth-child(4) .dot { animation-delay: 3.6s; }
.screen .row:nth-child(5) { animation-delay: 4.8s; }
.screen .row:nth-child(5) .dot { animation-delay: 4.8s; }
.screen .row:nth-child(6) { animation-delay: 6s; }
.screen .row:nth-child(6) .dot { animation-delay: 6s; }

@media (prefers-reduced-motion: reduce) {
  .screen .row,
  .screen .row .dot {
    animation: none !important;
  }
}














html.no-fade .phone::after { display: none !important; }

      <span class="batt"><span class="fill"></span></span></span></div>
    <div class="appbar"><span class="cancel">Cancel</span><span class="title">Voice Assistant</span></div>

      <div class="row"><div class="left"><span class="dot"></span><span class="label">Job Address</span></div><span class="val">42 Marine Pde</span></div>
      <div class="row"><div class="left"><span class="dot"></span><span class="label">Customer</span></div><span class="val">Sarah Jones</span></div>
      <div class="row"><div class="left"><span class="dot"></span><span class="label">Scope</span></div><span class="val">Kitchen tap</span></div>
      <div class="row"><div class="left"><span class="dot"></span><span class="label">Materials</span></div><span class="val">Compression fittings</span></div>

      <div class="row"><div class="left"><span class="dot"></span><span class="label">Fees</span></div><span class="val">Call-out + travel</span></div>
    </div>
