<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=900"><style>
@font-face { font-family:'BarlowBlkIt'; src:url('/fonts/BarlowCondensed-BlackItalic.ttf') format('truetype'); font-weight:900; font-style:italic; font-display:swap; }
@font-face { font-family:'BarlowBlk'; src:url('/fonts/BarlowCondensed-Black.ttf') format('truetype'); font-weight:900; font-style:normal; font-display:swap; }
@font-face { font-family:'Jakarta'; src:url('/fonts/PlusJakartaSans.ttf') format('truetype'); font-weight:400 700; font-style:normal; font-display:swap; }

* { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }

html, body { background:transparent; overflow:hidden; }

.phone {
  width:900px;
  height:1240px;
  background:#FFFFFF;
  border-radius:72px;
  overflow:hidden;
  position:relative;
  transform-origin:top left;
}
.phone::after {
  content:'';
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:560px;
  background:linear-gradient(to bottom, rgba(15,23,42,0) 0%, rgba(15,23,42,0.6) 40%, #0F172A 80%);
  z-index:20;
}

html.no-fade .phone::after { display: none !important; }

.statusbar {
  height:90px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 62px 0 70px;
  background:#F4F6F9;
}
.statusbar .time { font-family:'Jakarta'; font-weight:700; font-size:34px; color:#0F172A; }
.statusbar .icons { display:flex; align-items:center; gap:14px; }
.batt { width:54px; height:28px; border:3px solid #0F172A; border-radius:7px; position:relative; }
.batt::after { content:''; position:absolute; right:-7px; top:8px; width:5px; height:12px; background:#0F172A; border-radius:0 2px 2px 0; }
.batt .fill { position:absolute; left:3px; top:3px; bottom:3px; width:72%; background:#0F172A; border-radius:3px; }
</style></head><body class="send-screen"><div class="phone">

<span class="batt"><span class="fill"></span></span></span></div>
    <div style="background:#F4F6F9; padding:26px 56px 18px; display:flex; align-items:center; gap:30px;">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#0F172A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>

      <span style="font-family:'BarlowBlk'; font-weight:900; font-size:28px; letter-spacing:3px; color:#94A3B8; text-transform:uppercase;">Summary</span>
      <div style="background:#FFFFFF; border-radius:34px; padding:40px 46px; margin-top:16px; box-shadow:0 2px 12px rgba(15,23,42,0.06);">
        <div style="font-family:'Jakarta'; font-weight:800; font-size:56px; color:#0F172A; line-height:1.05;">Clean up the back garden</div>
